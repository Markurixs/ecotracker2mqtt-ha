<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ecotracker2mqtt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1c1c1c;color:#ccc;font-family:monospace;font-size:13px}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#252525;border-bottom:1px solid #333}
#header h1{font-size:14px;font-weight:600;color:#e1e1e1}
#status{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
#dot{width:8px;height:8px;border-radius:50%;background:#555}
#dot.ok{background:#4caf50}
#dot.err{background:#f44336}
#log{flex:1;overflow-y:auto;padding:8px 12px;white-space:pre-wrap;word-break:break-all;line-height:1.6}
.line{display:block}
.line:nth-child(even){background:rgba(255,255,255,.02)}
.lvl-WARNING{color:#ffb74d}
.lvl-ERROR{color:#ef5350}
.lvl-DEBUG{color:#666}
#wrap{display:flex;flex-direction:column;height:100%}
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <h1>ecotracker2mqtt</h1>
    <div id="status"><span id="dot"></span><span id="stxt">Verbinde...</span></div>
  </div>
  <div id="log" id="log"></div>
</div>
<script>
(function(){
  const logEl=document.getElementById('log');
  const dot=document.getElementById('dot');
  const stxt=document.getElementById('stxt');
  let prev=0;
  let autoScroll=true;

  logEl.addEventListener('scroll',function(){
    autoScroll=logEl.scrollTop+logEl.clientHeight>=logEl.scrollHeight-30;
  });

  function esc(s){
    const d=document.createElement('div');d.textContent=s;return d.innerHTML;
  }

  function lvlClass(line){
    if(line.includes('[ERROR]'))return 'lvl-ERROR';
    if(line.includes('[WARNING]'))return 'lvl-WARNING';
    if(line.includes('[DEBUG]'))return 'lvl-DEBUG';
    return '';
  }

  async function poll(){
    try{
      const r=await fetch('./api/logs');
      if(!r.ok)throw new Error(r.status);
      const lines=await r.json();
      dot.className='ok';
      stxt.textContent=lines.length+' Zeilen';

      if(lines.length!==prev){
        logEl.innerHTML=lines.map(l=>'<span class="line '+lvlClass(l)+'">'+esc(l)+'</span>').join('\n');
        prev=lines.length;
        if(autoScroll)logEl.scrollTop=logEl.scrollHeight;
      }
    }catch(e){
      dot.className='err';
      stxt.textContent='Verbindung verloren';
    }
  }

  poll();
  setInterval(poll,1000);
})();
</script>
</body>
</html>
